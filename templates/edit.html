<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑备忘录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>✏️ 编辑备忘录</h1>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">← 返回列表</a>
        </header>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <div class="flash-message">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="edit-memo">
            <form method="POST" action="{{ url_for('edit_memo', memo_id=memo.id) }}">
                <div class="form-group">
                    <label for="title">标题:</label>
                    <input type="text" id="title" name="title" value="{{ memo.title }}" required>
                </div>
                <div class="form-group">
                    <label for="content">内容:</label>
                    <textarea id="content" name="content" rows="6" required>{{ memo.content }}</textarea>
                </div>
                <div class="form-group">
                    <label for="tags">标签 (用逗号分隔):</label>
                    <input type="text" id="tags" name="tags" value="{{ memo.tags|join(', ') }}" placeholder="工作, 生活, 学习">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
