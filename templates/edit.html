<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑备忘录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-inner">
                <header class="app-header">
                    <h1><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; margin-top: -4px;"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>我的备忘录</h1>
                    <p>修改你的记录与灵感</p>
                </header>

                <div class="sidebar-section" style="margin-top: 20px;">
                    <a href="{{ url_for('index') }}" class="btn btn-secondary btn-block">← 返回列表</a>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <div class="container">
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="flash-messages">
                            {% for message in messages %}
                                <div class="flash-message">{{ message }}</div>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                <div class="edit-memo">
                    <div class="edit-header-bar">
                        <h2>
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 12px; color: var(--accent);"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                            潜心编辑
                        </h2>
                    </div>
                    <form method="POST" action="{{ url_for('edit_memo', memo_id=memo.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <div class="form-group">
                            <label for="title">标题</label>
                            <input type="text" id="title" name="title" value="{{ memo.title|e }}" required>
                        </div>
                        <div class="form-group">
                            <label for="content">正文内容</label>
                            <textarea id="content" name="content" rows="12" required>{{ memo.content|e }}</textarea>
                        </div>
                        <div class="form-group">
                            <label for="tags">标签 (选用逗号分隔)</label>
                            <input type="text" id="tags" name="tags" value="{{ memo.tags|join(', ')|e }}" placeholder="工作, 生活, 学习">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" style="padding-left: 40px; padding-right: 40px;">保存修改</button>
                            <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
